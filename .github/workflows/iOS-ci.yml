name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build project
        run: |
          cd SampleApps/WordScramble/WordScramble
          xcodebuild \
          -project WordScramble.xcodeproj \
          -scheme WordScramble \
          -destination 'generic/platform=iOS Simulator' \
          clean build
